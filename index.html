<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Awesome Site</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            line-height: 1.6;
        }
        h1 {
            color: #333;
        }
        .deploy-info {
            background: #f4f4f4;
            padding: 10px;
            border-radius: 5px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Welcome to My Site</h1>
    <p>This site is automatically deployed using GitHub Actions! Updated at [current time]</p>
    <div class="deploy-info">
        <p><strong>Deployment Status:</strong> Active</p>
        <p><strong>Last Updated:</strong> Check your commits</p>
    </div>
</body>
</html>
